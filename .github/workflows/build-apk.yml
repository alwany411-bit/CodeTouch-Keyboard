name: Build CodeTouch Keyboard APK

# يعمل تلقائيًا عند كل push على main، ويمكن أيضًا تشغيله يدويًا من تبويب Actions
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # المستودع لا يحتوي على gradlew / gradlew.bat / gradle-wrapper.jar
      # (بيئة التوليد لم تملك اتصال إنترنت لتحميل ملف Gradle الثنائي
      # الرسمي). هذه الخطوة تُثبّت توزيعة Gradle 8.7 الرسمية من مصدرها
      # الرسمي، ثم تُشغّل مهمة `gradle wrapper` الرسمية نفسها التي
      # يستخدمها Android Studio لتوليد wrapper رسمي مطابق 100%.
      - name: Install official Gradle 8.7
        run: |
          curl -fL -o /tmp/gradle-8.7-bin.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q /tmp/gradle-8.7-bin.zip -d "$HOME"
          echo "$HOME/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Generate official Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeTouch-Keyboard-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
